<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Voxel Box</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { background-color: #ffffff; padding-top: 20px; color: white; font-family: monospace; }
        .booth {
            position: relative; 
            width: 100%;
            max-width: 800px;
            height: 600px;
            margin: 0 auto; 
            background-color: #ffffff; 
            border: 2px solid #000000;
            border-radius: 4px;
            overflow: hidden;
        }
        #video, #canvas-2d, #canvas-3d {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform: scaleX(-1);
        }
        #canvas-2d { z-index: 5; }  
        
        /* EFEK GLOW/MENYALA (Sihir CSS untuk Canvas 3D) */
        #canvas-3d { 
            z-index: 10; 
            pointer-events: none; 
            filter: drop-shadow(0 0 4px #00ffff) drop-shadow(0 0 10px #00ffff);
        } 
        
        .hud {
            position: absolute;
            top: 15px; left: 15px;
            z-index: 20;
            color: #ffffff;
            pointer-events: none;
            line-height: 1.3;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-sm-12 col-md-10">
                <div class="text-center mb-3">
                    <h4 style="color:#00ffff; text-shadow: 0 0 10px #00ffff;"></h4>
                </div>
                
                <div class="card bg-transparent border-0">
                    <div class="card-body text-center p-0">
                        <div class="booth">
                            <video id="video" autoplay playsinline></video>
                            <canvas id="canvas-2d"></canvas>
                            <canvas id="canvas-3d"></canvas>
                            
                            <div class="hud" id="hud-text">
                                BLOCKS: <span id="voxel-count">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer text-center border-0 mt-3">
                        <button class="btn btn-outline-info" onClick="startCam()">[Open Cam]</button>
                        <button class="btn btn-outline-danger" onClick="clearVoxels()">[ Reset Block ]</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // IMPORT OTOMATIS VERSI TERBARU DI SINI
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const videoElement = document.getElementById('video');
        const canvas2d = document.getElementById('canvas-2d');
        const ctx2d = canvas2d.getContext('2d');
        const voxelCountText = document.getElementById('voxel-count');

        // ==========================================
        // 1. SETTING THREE.JS 
        // ==========================================
        const canvas3d = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(50, 800/600, 0.1, 1000);
        camera3D.position.z = 6; 

        const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
        renderer.setSize(800, 600);

        const gridSize = 0.4; 
        const boxGeo = new THREE.BoxGeometry(gridSize, gridSize, gridSize);
        const edgesGeo = new THREE.EdgesGeometry(boxGeo); 

        const solidMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff });
        const dashedMaterial = new THREE.LineDashedMaterial({ 
            color: 0x00ffff, 
            dashSize: 0.05, 
            gapSize: 0.05,  
            transparent: true,
            opacity: 0.7
        });

        const voxelGroup = new THREE.Group();
        scene.add(voxelGroup);

        const hoverVoxel = new THREE.LineSegments(edgesGeo, dashedMaterial);
        hoverVoxel.computeLineDistances(); 
        hoverVoxel.visible = false; 
        voxelGroup.add(hoverVoxel);

        let voxelCount = 0;
        let lastDrawnPos = { x: null, y: null, z: null }; 

        function animate3D() {
            requestAnimationFrame(animate3D);
            renderer.render(scene, camera3D);
        }
        animate3D();

        // ==========================================
        // 2. SETTING AI MEDIAPIPE
        // ==========================================
        let handLandmarker = undefined;
        let webcamRunning = false;
        let lastVideoTime = -1;

        const createHandLandmarker = async () => {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });
                console.log("Otak AI Sudah Siap!");
            } catch (error) {
                console.error("Gagal memuat AI:", error);
            }
        };
        createHandLandmarker();

        // ==========================================
        // 3. FUNGSI PREDIKSI & LOGIKA MENGGAMBAR
        // ==========================================
        let prevRotateX = null;
        let prevRotateY = null;

        async function predictWebcam() {
            if (lastVideoTime !== videoElement.currentTime) {
                lastVideoTime = videoElement.currentTime;
                
                const results = handLandmarker.detectForVideo(videoElement, performance.now());
                
                ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
                hoverVoxel.visible = false;

                if (results.landmarks) {
                    for (let i = 0; i < results.landmarks.length; i++) {
                        const landmarks = results.landmarks[i];
                        const handLabel = results.handednesses[i][0].categoryName; 
                        
                        const thumbTip = landmarks[4];
                        const indexTip = landmarks[8];
                        
                        const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                        const isPinching = distance < 0.05;

                        // TANGAN KANAN (Tugas: Menggambar)
                        if (handLabel === "Left") {  
                            let rawX = (indexTip.x - 0.5) * 8;
                            let rawY = -(indexTip.y - 0.5) * 6;
                            
                            let snapX = Math.round(rawX / gridSize) * gridSize;
                            let snapY = Math.round(rawY / gridSize) * gridSize;
                            let snapZ = 0; 

                            hoverVoxel.position.set(snapX, snapY, snapZ);
                            hoverVoxel.visible = true;

                            if (isPinching) {
                                if (snapX !== lastDrawnPos.x || snapY !== lastDrawnPos.y) {
                                    const newVoxel = new THREE.LineSegments(edgesGeo, solidMaterial);
                                    newVoxel.position.set(snapX, snapY, snapZ);
                                    
                                    voxelGroup.add(newVoxel);
                                    voxelCount++;
                                    voxelCountText.innerText = voxelCount;
                                    
                                    lastDrawnPos = { x: snapX, y: snapY, z: snapZ };
                                }
                            } else {
                                lastDrawnPos = { x: null, y: null, z: null };
                            }
                        } 
                        // TANGAN KIRI (Tugas: Memutar Panggung)
                        else if (handLabel === "Right") {
                            if (isPinching) {
                                if (prevRotateX !== null) {
                                    const deltaX = indexTip.x - prevRotateX;
                                    const deltaY = indexTip.y - prevRotateY;
                                    
                                    voxelGroup.rotation.y += deltaX * 5; 
                                    voxelGroup.rotation.x += deltaY * 5;
                                }
                                prevRotateX = indexTip.x;
                                prevRotateY = indexTip.y;
                            } else {
                                prevRotateX = null;
                                prevRotateY = null;
                            }
                        }
                    }
                }
            }
            
            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // ==========================================
        // 4. TOMBOL KONTROL
        // ==========================================
        const startCam = async () => {
            if (!handLandmarker) {
                alert("Tunggu sebentar, AI masih di-load dari internet...");
                return;
            }
            if (webcamRunning === true) { return; }
            webcamRunning = true;

            const constraints = { video: { width: 800, height: 600 } };
            navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                videoElement.srcObject = stream;
                // Pastikan ukuran canvas 2d sama dengan video
                canvas2d.width = 800;
                canvas2d.height = 600;
                videoElement.addEventListener("loadeddata", predictWebcam);
            });
        };

        const clearVoxels = () => {
            while(voxelGroup.children.length > 1){ 
                voxelGroup.remove(voxelGroup.children[voxelGroup.children.length - 1]); 
            }
            voxelCount = 0;
            voxelCountText.innerText = voxelCount;
            voxelGroup.rotation.set(0,0,0);
        };

        // KUNCI: Menyambungkan fungsi ke tombol HTML agar onClick tetap jalan
        window.startCam = startCam;
        window.clearVoxels = clearVoxels;
    </script>
</body>
</html>
